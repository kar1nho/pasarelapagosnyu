<form [formGroup]="form" class="wallet-form">

  <div class="form-group mb-3">
    <label class="form-label">
      Correo institucional
    </label>

    <input
      type="email"
      class="form-control"
      formControlName="studentEmail"
      placeholder="estudiante@nyu.cl">

    <small
      class="text-danger"
      *ngIf="isInvalid('studentEmail')">
      Ingresa un correo válido
    </small>
  </div>

  <div class="form-group mb-3">
    <label class="form-label">
      PIN
    </label>

    <input
      type="password"
      class="form-control"
      formControlName="pin"
      maxlength="6"
      placeholder="PIN de 4 a 6 dígitos"
      (keypress)="allowOnlyNumbers($event)"
      (input)="sanitizePin()">

    <small
      class="text-danger"
      *ngIf="isInvalid('pin')">
      El PIN debe tener entre 4 y 6 números
    </small>
  </div>

</form>
