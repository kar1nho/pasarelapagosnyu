<form [formGroup]="form" class="card-form">

  <div class="form-group mb-3">
    <label class="form-label">
      Número de tarjeta
    </label>

    <input
      type="text"
      class="form-control"
      formControlName="cardNumber"
      maxlength="19"
      placeholder="1234 5678 9012 3456"
      (keypress)="allowOnlyNumbers($event)"
      (input)="formatCardNumber($event)">

    <small
      class="text-danger"
      *ngIf="isInvalid('cardNumber')">
      Tarjeta inválida
    </small>
  </div>

  <div class="form-group mb-3">
    <label class="form-label">
      Titular
    </label>

    <input
      type="text"
      class="form-control"
      formControlName="holder"
      placeholder="Nombre del titular">

    <small
      class="text-danger"
      *ngIf="isInvalid('holder')">
      Campo requerido
    </small>
  </div>

  <div class="row mb-3">
    <div class="col-md-6">
      <label class="form-label">
        Mes de expiración
      </label>

      <select
        class="form-control"
        formControlName="expiryMonth">

        <option value="">
          Seleccionar mes
        </option>

        <option
          *ngFor="let month of months"
          [value]="month">
          {{ month }}
        </option>
      </select>

      <small
        class="text-danger"
        *ngIf="isInvalid('expiryMonth')">
        Selecciona un mes
      </small>
    </div>

    <div class="col-md-6">
      <label class="form-label">
        Año de expiración
      </label>

      <select
        class="form-control"
        formControlName="expiryYear">

        <option value="">
          Seleccionar año
        </option>

        <option
          *ngFor="let year of years"
          [value]="year">
          {{ year }}
        </option>
      </select>

      <small
        class="text-danger"
        *ngIf="isInvalid('expiryYear')">
        Selecciona un año
      </small>
    </div>
  </div>

  <small
    class="text-danger d-block mb-3"
    *ngIf="isCardExpired()">
    La tarjeta se encuentra vencida
  </small>

  <div class="form-group">
    <label class="form-label">
      CVV
    </label>

    <input
      type="password"
      class="form-control"
      formControlName="cvv"
      maxlength="4"
      placeholder="123"
      (keypress)="allowOnlyNumbers($event)"
      (input)="sanitizeCvv()">

    <small
      class="text-danger"
      *ngIf="isInvalid('cvv')">
      CVV inválido
    </small>
  </div>

</form>
